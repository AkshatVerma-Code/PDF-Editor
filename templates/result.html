<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - Bhai ka Pdf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row">
            <div class="col-md-5 mb-4 mb-md-0 d-flex flex-column align-items-center justify-content-center">
                <div class="animate__animated animate__fadeInDown w-100 text-center text-md-start">
                    <h2 class="fw-bold text-success mb-4">Operation Successful!</h2>
                    <a href="{{ download_url }}" class="btn btn-lg btn-success mb-3 w-100">Download Your PDF</a>
                </div>
                <div class="mt-4 animate__animated animate__fadeInUp w-100 text-center text-md-start">
                    <h4 class="mb-3">What would you like to do next?</h4>
                    <div class="d-flex flex-wrap justify-content-center justify-content-md-start gap-3">
                        <a href="/operation?continue=1" class="btn btn-outline-primary">Continue Editing</a>
                        <a href="/" class="btn btn-outline-secondary">Start Over</a>
                    </div>
                </div>
            </div>
            <div class="col-md-7 animate__animated animate__fadeInUp">
                <h5 class="mb-3">Preview</h5>
                <div id="pdf-preview" class="border rounded shadow-sm w-100" style="min-height:500px;"></div>
            </div>
        </div>
    </div>
    <script>
        window.previewUrl = "{{ preview_url }}";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="/static/js/pdfjs/pdf.js"></script>
    <script src="/static/js/pdfjs/pdf.worker.js"></script>
    <script src="/static/js/pdf_preview.js"></script>
</body>
</html>
